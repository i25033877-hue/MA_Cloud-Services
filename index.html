<!DOCTYPE html>
<html>
<head>
<style>
  .bigButton{
    font-size: 20px;
    padding: 12px 30px;
    background-color: black;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: block;
    margin: 20px auto;
  }
h1{
  text-align: center;
}
p{
  text-align: center;
}
img{
  display: block;
  margin: 20px auto;
}
</style>
<title>My First Cloud Web Page</title>
</head>
<body>
  
<h1>My First Cloud Web Page</h1>
<p>Welcome to my web page hosted on the cloud!</p>
  
<img id="myImage" src="hajimicat.jpg" width="300">

<br><br>
<button onclick="changeImage()" class="bigButton">TOUCH ME :)</button>


<script>
  function changeImage(){
    var img = document.getElementById("myImage");

    if (img.src.includes("hajimicat.jpg")){
      img.src = "hajimicat2.jpeg";
    } else{
      img.src = "hajimicat.jpg";
    }
  }

  // 🌈 10分段 来回 RGB 渐变
  let hue = 0;
  let direction = 1; // 1 = 向右流动, -1 = 向左流动

  setInterval(function(){

    let gradient = "linear-gradient(to right";

    for(let i = 0; i <= 10; i++){
      let color = `hsl(${(hue + i*25) % 360}, 100%, 50%)`;
      gradient += `, ${color}`;
    }

    gradient += ")";
    document.body.style.background = gradient;

    hue += direction;

    // 到达边界就反方向
    if(hue >= 360 || hue <= 0){
      direction *= -1;
    }

  }, 20);
</script>
</body>
</html>
