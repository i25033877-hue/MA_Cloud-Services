<!DOCTYPE html>
<html>
<head>
<style>
  .bigButton{
    font-size: 20px;
    padding: 12px 30px;
    background-color: black;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: block;
    margin: 20px auto;
  }
h1{
  text-align: center;
}
p{
  text-align: center;
}
img{
  display: block;
  margin: 20px auto;
}
</style>
<title>My First Cloud Web Page</title>
</head>
<body>
  
<h1>My First Cloud Web Page</h1>
<p>Welcome to my web page hosted on the cloud!</p>
  
<img id="myImage" src="hajimicat.jpg" width="300">

<br><br>
<button onclick="changeImage()" class="bigButton">TOUCH ME :)</button>


<script>
  function changeImage(){
    var img = document.getElementById("myImage");

    if (img.src.includes("hajimicat.jpg")){
      img.src = "hajimicat2.jpeg";
    } else{
      img.src = "hajimicat.jpg";
    }
  }

  // 🌈 超丝滑 360 段彩虹流动
  let offset = 0;

  setInterval(function(){

    let gradient = "linear-gradient(to right";

    for(let i = 0; i < 360; i++){
      let hue = (i + offset) % 360;
      gradient += `, hsl(${hue}, 100%, 50%)`;
    }

    gradient += ")";

    document.body.style.background = gradient;

    offset += 1;  // 控制流动速度

  }, 30);
</script>
</body>
</html>
